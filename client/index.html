<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <!-- iOS homescreen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Switchboard" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Preload critical font (Poppins for headings & body) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap">
  <!-- Critical: only Poppins blocks render -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Non-critical fonts: Kalam (sticky notes) & Plus Jakarta Sans (landlord pages) loaded async -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <!-- Ben's avatar is the first face on the quote loading screen and is the SAME
       file on every quote (unlike the job-dependent hero below). On a cold start
       the <img> isn't discovered until the JS bundle parses and React mounts
       QuotePreparingScreen, so the avatar pops in late. This parse-time hint
       (scoped to the public quote routes — /quote, /quote-link, /q — so admin and
       landing pages don't fetch it, avoiding wasted bandwidth + unused-preload
       warnings) fires the ~15KB request in parallel with the bundle, landing it
       in cache before the loading screen renders. -->
  <script>
    (function () {
      if (/^\/(quote|quote-link|q)\//.test(location.pathname)) {
        var l = document.createElement('link');
        l.rel = 'preload';
        l.as = 'image';
        l.href = '/assets/quote-images/ben-estimator.webp';
        l.type = 'image/webp';
        l.setAttribute('fetchpriority', 'high');
        document.head.appendChild(l);
      }
    })();
  </script>
  <!-- Hero image is job-dependent and unknown at HTML-parse time (plumbing,
       painting, landlord/elderly, default each use a different .webp). The
       asset-readiness gate in PersonalizedQuotePage warms the correct hero
       from getHeroImage(quote) once quote data loads, so a static preload of
       one fixed hero here would just waste bandwidth on most quotes. -->
  <title>Handy Services - Best Rated Handyman Service</title>
  <meta property="og:title" content="Handy Services - Best Rated Handyman Service" />
  <meta property="og:description" content="Book a vetted pro in seconds. Standard & Priority options available." />
  <meta property="og:type" content="website" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
