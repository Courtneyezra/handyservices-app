<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Handy WhatsApp Sync</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px 0;
        color: #38bdf8;
        letter-spacing: 0.02em;
      }
      label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin: 10px 0 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        box-sizing: border-box;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 9px;
        border: none;
        border-radius: 6px;
        background: #0ea5e9;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #0284c7; }
      button.secondary {
        background: #334155;
        color: #e2e8f0;
      }
      button.secondary:hover { background: #475569; }
      .status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 6px;
        background: #1e293b;
        font-size: 12px;
        line-height: 1.5;
      }
      .status.ok { border-left: 3px solid #22c55e; }
      .status.err { border-left: 3px solid #ef4444; }
      .status.idle { border-left: 3px solid #64748b; }
      .row { display: flex; justify-content: space-between; }
      .muted { color: #94a3b8; }
    </style>
  </head>
  <body>
    <h1>Handy Services · WhatsApp Sync</h1>

    <label for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="text" placeholder="https://handyservices.app" />

    <label for="ingestToken">Ingest Token</label>
    <input id="ingestToken" type="password" placeholder="paste token from Courtnee" />

    <button id="save">Save &amp; Test Connection</button>
    <button id="forceFlush" class="secondary">Flush Queue Now</button>

    <div id="status" class="status idle">Not connected yet.</div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
